<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Patas do Bem</title>

    <link rel="icon" type="image/png" href="Imagens/pata.PNG">

    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="perfil.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <section class="cadastro-container">

        <div class="cadastro-card">

            <div class="cadastro-header">
                <img src="Imagens/logo (3).PNG" alt="Logo Patas do Bem">

                <h1>Criar Conta</h1>

                <p>
                    Cadastre-se para acompanhar ocorrências,
                    interagir no InstaCão e ajudar os doguinhos do campus.
                </p>
            </div>

            <form id="cadastroForm">

                <div class="input-group">
                    <label for="nome">Nome Completo</label>

                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="exemplo@email.com"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <div class="input-group">
                    <label for="confirmarSenha">
                        Confirmar Senha
                    </label>

                    <input
                        type="password"
                        id="confirmarSenha"
                        placeholder="Digite novamente"
                        required
                    >
                </div>

                <button type="submit" class="btn-cadastrar">
                    <i class="ph ph-user-plus"></i>
                    Criar Conta
                </button>

            </form>

            <div class="cadastro-footer">

                <p>Já possui uma conta?</p>

                <a href="login.html">
                    Fazer Login
                </a>

            </div>

        </div>

    </section>

    <script src="javascript.js"></script>
    <script src="database.js"></script>
    

    

</body>
</html>
