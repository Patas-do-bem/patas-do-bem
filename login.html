<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Patas do Bem</title>

    <link rel="icon" type="image/png" href="Imagens/pata.PNG">

    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="perfil.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <section class="cadastro-container">

        <div class="cadastro-card">

            <div class="cadastro-header">

                <img src="Imagens/logo (3).PNG" alt="Logo Patas do Bem">

                <h1>Entrar</h1>

                <p>
                    Faça login para acessar seu perfil e acompanhar
                    as atividades do Patas do Bem.
                </p>

            </div>

            <form id="loginForm">

                <div class="input-group">

                    <label for="email">
                        E-mail
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu e-mail"
                        required
                    >

                </div>

                <div class="input-group">

                    <label for="senha">
                        Senha
                    </label>

                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required
                    >

                </div>

                <button type="submit" class="btn-cadastrar">

                    <i class="ph ph-sign-in"></i>

                    Entrar

                </button>

            </form>

            <div class="cadastro-footer">

                <p>Não possui conta?</p>

                <a href="cadastro.html">
                    Criar Conta
                </a>

            </div>

        </div>

    </section>

    <script src="javascript.js"></script>
    <script src="database.js"></script>
    <script src="cadastro-acoes.js"></script>

</body>
</html>
